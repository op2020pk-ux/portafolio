<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compras Realizadas | OP Panel</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/admin.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <a href="inicio.html" class="logo">OP<span>_LOGS</span></a>
        <nav>
            <a href="admin.html" class="btn-neon"><i class="fa-solid fa-arrow-left"></i> Volver al Gestor de Contenido</a>
        </nav>
    </header>

    <main class="container-admin" style="display: block;">
        <div id="panel-compras">
            <div class="panel-header">
                <h2><i class="fa-solid fa-cart-flatbed-suitcase"></i> Registro de Compras e Interesados</h2>
                <button id="btn-limpiar-compras" class="btn-danger" onclick="limpiarHistorialCompras()"><i class="fa-solid fa-trash-can"></i> Limpiar Historial</button>
            </div>

            <div style="overflow-x: auto; background: var(--bg-card); padding: 1.5rem; border-radius: 8px; border: 1px solid rgba(0, 242, 254, 0.15);">
                <table style="width: 100%; border-collapse: collapse; text-align: left; color: var(--text-light);">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--neon-purple); color: var(--neon-blue);">
                            <th style="padding: 1rem;">Código</th>
                            <th style="padding: 1rem;">Cliente</th>
                            <th style="padding: 1rem;">Teléfono</th>
                            <th style="padding: 1rem;">Correo</th>
                            <th style="padding: 1rem;">Software Solicitado</th>
                            <th style="padding: 1rem;">Precio</th>
                            <th style="padding: 1rem; text-align: center;">Estado / Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-compras-body">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('op_sesion') !== 'activa') {
                alert('Acceso denegado. Por favor inicie sesión en el panel.');
                window.location.href = 'admin.html';
            } else {
                renderTablaCompras();
            }
        });
    </script>
    <script src="js/app.js"></script>
</body>
</html>
